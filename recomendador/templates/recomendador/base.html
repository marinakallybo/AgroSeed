{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PéDeQuê?{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'recomendador/css/style.css' %}">
</head>
<body>
    <header class="navbar">
        <div class="navbar-brand">
            <span class="logo">🌱</span>
            <span>PéDeQuê?</span>
        </div>

        <nav class="navbar-links">
            <a href="/recomendar/">Recomendação</a>
            <a href="/culturas/">Culturas</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>PéDeQuê? — Tecnologia para apoiar a agricultura familiar.</p>
    </footer>
</body>
</html>
